<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse all medicines on MediStore – tablets, syrups, vitamins and more at the best prices.">
    <title>Products – MediStore</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- ── Navbar ── -->
<nav class="medistore-nav">
    <a href="index.html" class="nav-logo">
        <div class="logo-icon">M</div>
        <span class="logo-text">Medi<span>Store</span></span>
    </a>
    <div class="nav-links">
        <a href="index.html"    class="nav-link-item">Home</a>
        <a href="products.html" class="nav-link-item active">Products</a>
        <a href="conditions.html" class="nav-link-item">Conditions</a>
        <button id="darkToggle" class="dark-toggle-btn" onclick="toggleMode()" title="Toggle dark mode">🌙</button>
        <div id="navUserArea"></div>
        <a href="cart.html" class="nav-cart-btn">
            <i class="fa fa-shopping-cart"></i> Cart
            <span class="cart-badge" id="cartCount">0</span>
        </a>
    </div>
</nav>

<!-- ── Page Header ── -->
<div style="background:linear-gradient(135deg,#0f7a45,#22c55e);padding:40px 0 32px;color:white;">
    <div class="container">
        <div class="section-tag" style="background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3)">All Products</div>
        <h1 style="font-size:2rem;font-weight:800;margin-top:8px;letter-spacing:-0.5px">Browse Medicines</h1>
        <p style="opacity:0.85;margin-top:6px;font-size:0.95rem">Genuine products · Best prices · Fast delivery</p>
    </div>
</div>

<!-- ── Search & Filter ── -->
<div style="background:white;border-bottom:1px solid var(--gray-200);padding:18px 0;">
    <div class="container">
        <div class="d-flex flex-wrap gap-3 align-items-center justify-content-between">
            <div class="d-flex gap-2 align-items-center" style="flex:1;min-width:220px">
                <div class="search-wrap" style="flex:1">
                    <input type="text" id="productSearch" placeholder="Search medicines, vitamins…" oninput="searchProducts()">
                    <span class="search-icon"><i class="fa fa-search"></i></span>
                </div>
                <button class="rx-scan-btn" id="rxScanBtn" onclick="document.getElementById('rxFileInput').click()" title="Scan Prescription">
                    <i class="fa fa-camera"></i>
                    <span>Scan Rx</span>
                </button>
                <input type="file" id="rxFileInput" accept="image/*" capture="environment" style="display:none" onchange="handlePrescriptionScan(event)">
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <button class="filter-btn active" onclick="filterProducts('all')">All</button>
                <button class="filter-btn" onclick="filterProducts('tablets')">Tablets</button>
                <button class="filter-btn" onclick="filterProducts('syrup')">Syrups</button>
                <button class="filter-btn" onclick="filterProducts('vitamins')">Vitamins</button>
            </div>
        </div>
    </div>
</div>

<!-- ── Products Grid ── -->
<section class="section-gap">
    <div class="container">
        <div class="row g-4" id="productsGrid">
            <!-- Dynamic Content -->
            <div class="col-12 text-center py-5">
                <i class="fa fa-spinner fa-spin fa-2x" style="color:var(--green-500)"></i>
                <p class="mt-3">Connecting to medical warehouse...</p>
            </div>
        </div>
    </div>
</section>

<!-- ── Modal & Banner (Placeholder for logic) ── -->
<div class="rx-modal-overlay" id="rxModal">
    <!-- simplified for clarity, keeping logic consistent with script.js -->
</div>

<footer class="site-footer">
    <div class="container">
        <div class="footer-bottom">
            <span>© 2025 MediStore. All rights reserved.</span>
            <span>Your Trusted Medical Partner</span>
        </div>
    </div>
</footer>

<script src="../js/script.js"></script>
<script>
    async function fetchProducts() {
        const grid = document.getElementById('productsGrid');
        try {
            const res = await fetch('http://localhost:5000/api/products');
            const products = await res.json();
            
            if (!products || products.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5"><h3>No products found.</h3></div>';
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="col-lg-3 col-md-4 col-sm-6 product-item" data-category="${p.category.toLowerCase()}" data-name="${p.name.toLowerCase()}">
                    <div class="product-card">
                        <div class="product-card-img-wrap" style="${!p.img ? 'background:#f8fafc;display:flex;align-items:center;justify-content:center;' : ''}">
                            ${p.img ? `<img src="${p.img}" alt="${p.name}">` : `<div style="font-size:4.5rem">💊</div>`}
                        </div>
                        <div class="product-card-body">
                            <span class="product-badge ${p.type === 'Rx' ? 'badge-rx' : 'badge-otc'}">${p.type}</span>
                            <div class="product-name">${p.name}</div>
                            <div class="product-desc">${p.description || ''}</div>
                            <div class="product-footer">
                                <div class="product-price">₹${p.price} ${p.mrp ? `<span class="old-price">₹${p.mrp}</span>` : ''}</div>
                                <button class="nav-link-item" onclick="showProductReviews('${p.name}')" style="font-size:0.75rem;padding:0;border:none;background:none;margin-bottom:8px;display:block;">⭐ View Reviews</button>
                                <div class="d-flex gap-2">
                                    <button class="wishlist-btn-small" onclick="addToWishlist('${p.name}', ${p.price}, '${p.img || ''}')" title="Add to Wishlist">
                                        <i class="fa fa-heart"></i>
                                    </button>
                                    <div class="qty-container" data-product-name="${p.name}" data-product-price="${p.price}" data-product-img="${p.img || ''}">
                                        <button class="btn-add-cart" onclick="addToCart('${p.name}', ${p.price}, '${p.img || ''}')">
                                            <i class="fa fa-plus"></i> Add
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (window.syncQuantityUI) window.syncQuantityUI();
        } catch (err) {
            grid.innerHTML = '<div class="col-12 text-center py-5"><h3 style="color:var(--red-500)">⚠️ Warehouse Connection Offline</h3><p>Make sure the backend is running on port 5000.</p></div>';
        }
    }

    /* ── Filtering Logic ── */
    function filterProducts(cat) {
        document.querySelectorAll('.product-item').forEach(item => {
            if (cat === 'all' || item.getAttribute('data-category') === cat) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    }

    function searchProducts() {
        const query = (document.getElementById('productSearch').value || '').toLowerCase();
        document.querySelectorAll('.product-item').forEach(item => {
            const name = (item.getAttribute('data-name') || '').toLowerCase();
            item.style.display = name.includes(query) ? 'block' : 'none';
        });
    }

    document.addEventListener('DOMContentLoaded', fetchProducts);
</script>
</body>
</html>
