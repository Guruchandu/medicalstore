<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard – MediStore</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .dashboard-container {
            min-height: 80vh;
            padding: 40px 0;
        }

        .dashboard-sidebar {
            background: white;
            border-radius: var(--radius-lg);
            border: 1.5px solid var(--gray-200);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            height: 100%;
        }

        .dash-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            border-radius: 10px;
            color: var(--gray-600);
            font-weight: 600;
            text-decoration: none;
            transition: all var(--transition);
            margin-bottom: 8px;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .dash-nav-item:hover {
            background: var(--green-50);
            color: var(--green-700);
        }

        .dash-nav-item.active {
            background: var(--green-600);
            color: white;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }

        .dash-nav-item i {
            width: 20px;
            text-align: center;
        }

        .dashboard-content {
            background: white;
            border-radius: var(--radius-lg);
            border: 1.5px solid var(--gray-200);
            padding: 40px;
            box-shadow: var(--shadow-md);
            min-height: 500px;
        }

        .dashboard-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .dashboard-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Profile Styles */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-500), var(--green-700));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
        }

        /* Order Card */
        .order-card {
            border: 1.5px solid var(--gray-100);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .order-card:hover {
            border-color: var(--green-200);
            box-shadow: var(--shadow-sm);
        }

        .order-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 99px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-shipped {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-delivered {
            background: #dcfce7;
            color: #166534;
        }

        /* Wishlist Grid */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Tracking Timeline */
        .tracking-timeline {
            position: relative;
            padding-left: 32px;
        }

        .tracking-timeline::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--gray-200);
        }

        .timeline-step {
            position: relative;
            padding-bottom: 32px;
        }

        .timeline-dot {
            position: absolute;
            left: -26px;
            top: 4px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--gray-400);
            border: 3px solid white;
        }

        .timeline-step.active .timeline-dot {
            background: var(--green-500);
            box-shadow: 0 0 0 4px var(--green-100);
        }

        body.dark .dashboard-sidebar,
        body.dark .dashboard-content {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark .dash-nav-item {
            color: #94a3b8;
        }

        body.dark .dash-nav-item:hover {
            background: rgba(34, 197, 94, 0.1);
        }

        body.dark .order-card {
            border-color: #334155;
        }
    </style>
</head>

<body>
    <!-- ── Navbar ── -->
    <nav class="medistore-nav">
        <a href="index.html" class="nav-logo">
            <div class="logo-icon">M</div>
            <span class="logo-text">Medi<span>Store</span></span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link-item">Home</a>
            <a href="products.html" class="nav-link-item">Products</a>
            <a href="conditions.html" class="nav-link-item">Conditions</a>
            <button id="darkToggle" class="dark-toggle-btn" onclick="toggleMode()" title="Toggle dark mode">🌙</button>
            <div id="navUserArea"></div>
            <a href="cart.html" class="nav-cart-btn">
                <i class="fa fa-shopping-cart"></i> Cart
                <span class="cart-badge" id="cartCount">0</span>
            </a>
        </div>
    </nav>

    <div class="dashboard-container container">
        <div class="row g-4">
            <div class="col-lg-3">
                <div class="dashboard-sidebar">
                    <button class="dash-nav-item" onclick="switchDashTab('profile')" id="btn-profile">
                        <i class="fa fa-user-circle"></i> My Profile
                    </button>
                    <button class="dash-nav-item" onclick="switchDashTab('orders')" id="btn-orders">
                        <i class="fa fa-box"></i> My Orders
                    </button>
                    <button class="dash-nav-item" onclick="switchDashTab('wishlist')" id="btn-wishlist">
                        <i class="fa fa-heart"></i> Wishlist
                    </button>
                    <button class="dash-nav-item" onclick="switchDashTab('tracking')" id="btn-tracking">
                        <i class="fa fa-truck-fast"></i> Tracking
                    </button>
                    <button class="dash-nav-item" onclick="switchDashTab('addresses')" id="btn-addresses">
                        <i class="fa fa-map-marker-alt"></i> Saved Addresses
                    </button>
                    <div class="dropdown-divider"></div>
                    <button class="dash-nav-item" style="color:var(--red-500)" onclick="logoutUser()">
                        <i class="fa fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
            <div class="col-lg-9">
                <div class="dashboard-content">
                    
                    <!-- Profile Section -->
                    <div id="section-profile" class="dashboard-section">
                        <div class="profile-header">
                            <div class="profile-avatar" id="profileInitial">U</div>
                            <div>
                                <h2 id="profileName" style="font-weight:800;margin:0;">User Name</h2>
                                <p id="profileEmail" style="color:var(--gray-500);margin:0;">user@example.com</p>
                            </div>
                        </div>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label-custom">Phone Number</label>
                                <input type="text" class="form-input" value="+91 98765 43210" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Joined Date</label>
                                <input type="text" class="form-input" value="January 2025" readonly>
                            </div>
                            <div class="col-12">
                                <label class="form-label-custom">Saved Address</label>
                                <textarea class="form-input" style="height:100px;" readonly>123 Medical Street, Health Avenue, Chennai, 600001</textarea>
                            </div>
                        </div>
                        <button class="btn-main mt-4" style="width:auto;padding:12px 24px;">Edit Profile</button>
                    </div>

                    <!-- Orders Section -->
                    <div id="section-orders" class="dashboard-section">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 style="font-weight:800;margin:0;">Order History</h3>
                            <span class="section-tag">All Time</span>
                        </div>
                        <div id="ordersList">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Wishlist Section -->
                    <div id="section-wishlist" class="dashboard-section">
                        <h3 style="font-weight:800;margin-bottom:24px;">My Wishlist</h3>
                        <div id="wishlistGrid" class="wishlist-grid">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Tracking Section -->
                    <div id="section-tracking" class="dashboard-section">
                        <h3 style="font-weight:800;margin-bottom:24px;">Live Order Tracking</h3>
                        <div id="trackingContent">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Addresses Section -->
                    <div id="section-addresses" class="dashboard-section">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 style="font-weight:800;margin:0;">Saved Addresses</h3>
                            <button class="btn-main" style="width:auto;padding:8px 16px;" onclick="openAddressForm()">+ Add New</button>
                        </div>
                        <div id="addressBookList" class="row g-3">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- ── Footer ── -->
    <!-- Rating Modal -->
    <div class="auth-modal-overlay" id="ratingModal" style="display:none;z-index:2000;">
        <div class="auth-modal-card" style="max-width:400px;">
            <div class="auth-modal-header">
                <div class="auth-modal-title">Rate Product</div>
                <button class="auth-modal-close" onclick="closeRatingModal()">✕</button>
            </div>
            <div class="p-4">
                <div id="ratingProductInfo" class="mb-3" style="font-weight:700;"></div>
                <div class="rating-input mb-4" id="starInput">
                    <i class="fa fa-star" data-value="1"></i>
                    <i class="fa fa-star" data-value="2"></i>
                    <i class="fa fa-star" data-value="3"></i>
                    <i class="fa fa-star" data-value="4"></i>
                    <i class="fa fa-star" data-value="5"></i>
                </div>
                <textarea id="ratingComment" class="form-input" style="height:100px;" placeholder="Write your review..."></textarea>
                <input type="hidden" id="ratingProdId">
                <button class="btn-main mt-4" onclick="submitRating()">Submit Review</button>
            </div>
        </div>
    </div>

    <!-- Address Modal -->
    <div class="auth-modal-overlay" id="addressModal" style="display:none;z-index:2000;">
        <div class="auth-modal-card" style="max-width:500px;">
            <div class="auth-modal-header">
                <div class="auth-modal-title">Save Address</div>
                <button class="auth-modal-close" onclick="closeAddressModal()">✕</button>
            </div>
            <form class="p-4" onsubmit="handleAddressSubmit(event)">
                <div class="mb-3">
                    <label class="form-label-custom">Address Title (e.g. Home, Office)</label>
                    <input type="text" id="addrTitle" class="form-input" required placeholder="Home">
                </div>
                <div class="mb-3">
                    <label class="form-label-custom">Full Address</label>
                    <textarea id="addrFull" class="form-input" style="height:80px;" required placeholder="Street, Building, Area..."></textarea>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label-custom">City</label>
                        <input type="text" id="addrCity" class="form-input" required placeholder="Chennai">
                    </div>
                    <div class="col-6">
                        <label class="form-label-custom">Pincode</label>
                        <input type="text" id="addrPin" class="form-input" required placeholder="600001">
                    </div>
                </div>
                <button type="submit" class="btn-main mt-2">Save Address</button>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">
                <span>© 2025 MediStore. All rights reserved.</span>
                <span>Your Trusted Medical Partner</span>
            </div>
        </div>
    </footer>

    <script src="../js/script.js"></script>
    <script>
        function switchDashTab(tabId) {
            // Update UI
            document.querySelectorAll('.dashboard-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.dash-nav-item').forEach(b => b.classList.remove('active'));
            
            const targetSec = document.getElementById('section-' + tabId);
            const targetBtn = document.getElementById('btn-' + tabId);
            
            if (targetSec && targetBtn) {
                targetSec.classList.add('active');
                targetBtn.classList.add('active');

                // Update URL without reload
                const url = new URL(window.location);
                url.searchParams.set('tab', tabId);
                window.history.pushState({}, '', url);

                // Load data
                if (tabId === 'profile') loadProfile();
                if (tabId === 'orders') renderOrders();
                if (tabId === 'wishlist') renderWishlist();
                if (tabId === 'tracking') renderTracking();
                if (tabId === 'addresses') renderAddresses();
            }
        }

        function loadProfile() {
            const user = getUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('profileInitial').textContent = user.name.charAt(0).toUpperCase();
        }

        async function renderOrders() {
            const container = document.getElementById('ordersList');
            try {
                const res = await fetch(`${API_URL}/orders/myorders`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const orders = await res.json();
                
                if (!orders || orders.length === 0) {
                    container.innerHTML = '<p class="text-center py-5" style="color:var(--gray-400)">No orders found.</p>';
                    return;
                }
                container.innerHTML = orders.reverse().map(ord => `
                <div class="order-card">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <div style="font-weight:700;font-size:1.1rem;color:var(--gray-900);">Order #${ord._id.slice(-6).toUpperCase()}</div>
                            <div style="font-size:0.8rem;color:var(--gray-400);">${new Date(ord.createdAt).toLocaleDateString()}</div>
                        </div>
                        <span class="order-status status-${ord.status}">${ord.status.toUpperCase()}</span>
                    </div>
                    <div style="font-size:0.88rem;color:var(--gray-600);margin-bottom:12px;">
                        ${ord.orderItems.map(i => `
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span>${i.name} × ${i.quantity}</span>
                                ${ord.status === 'delivered' ? `
                                    <button class="btn-hero-secondary" style="padding:4px 8px;font-size:0.7rem;border-radius:6px;" 
                                            onclick="openRatingModal('${i.name.replace(/'/g, "\\'")}')">
                                        <i class="fa fa-star"></i> Rate
                                    </button>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <div style="font-weight:800;color:var(--green-700);">₹${ord.totalPrice}</div>
                        <button class="nav-link-item" style="padding:4px 12px;font-size:0.8rem;">View Details</button>
                    </div>
                </div>
            `).join('');
        }

        /* Rating System Logic */
        let currentRating = 0;
        function openRatingModal(prodName) {
            document.getElementById('ratingProductInfo').textContent = prodName;
            document.getElementById('ratingProdId').value = prodName;
            document.getElementById('ratingModal').style.display = 'flex';
            currentRating = 0;
            updateStarUI();
        }

        function closeRatingModal() {
            document.getElementById('ratingModal').style.display = 'none';
        }

        document.getElementById('starInput').addEventListener('click', (e) => {
            if (e.target.dataset.value) {
                currentRating = parseInt(e.target.dataset.value);
                updateStarUI();
            }
        });

        function updateStarUI() {
            document.querySelectorAll('#starInput i').forEach(star => {
                star.classList.toggle('active', parseInt(star.dataset.value) <= currentRating);
            });
        }

        function submitRating() {
            const prodName = document.getElementById('ratingProdId').value;
            const comment = document.getElementById('ratingComment').value;
            if (currentRating === 0) {
                showToast('❌ Please select a rating');
                return;
            }
            saveReview(prodName, currentRating, comment);
            closeRatingModal();
        }

        /* Address Book Logic */
        function renderAddresses() {
            const addrs = getAddresses();
            const container = document.getElementById('addressBookList');
            if (addrs.length === 0) {
                container.innerHTML = '<p class="text-center py-5 col-12" style="color:var(--gray-400)">No saved addresses.</p>';
                return;
            }
            container.innerHTML = addrs.map(a => `
                <div class="col-md-6">
                    <div class="order-card h-100">
                        <div class="d-flex justify-content-between mb-2">
                            <strong style="color:var(--gray-900);">${a.title}</strong>
                            <button onclick="deleteAddress(${a.id}); renderAddresses();" style="border:none;background:none;color:var(--red-500);cursor:pointer;">✕</button>
                        </div>
                        <p style="font-size:0.85rem;color:var(--gray-600);margin:0;">${a.address}</p>
                        <p style="font-size:0.85rem;color:var(--gray-500);margin:2px 0 0 0;">${a.city} - ${a.pincode}</p>
                    </div>
                </div>
            `).join('');
        }

        function openAddressForm() {
            document.getElementById('addressModal').style.display = 'flex';
        }

        function closeAddressModal() {
            document.getElementById('addressModal').style.display = 'none';
        }

        function handleAddressSubmit(e) {
            e.preventDefault();
            const addr = {
                title: document.getElementById('addrTitle').value,
                address: document.getElementById('addrFull').value,
                city: document.getElementById('addrCity').value,
                pincode: document.getElementById('addrPin').value
            };
            saveAddress(addr);
            closeAddressModal();
            renderAddresses();
        }

        function renderWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            const container = document.getElementById('wishlistGrid');
            if (wishlist.length === 0) {
                container.innerHTML = '<p class="text-center py-5 col-12" style="color:var(--gray-400)">Wishlist is empty.</p>';
                return;
            }
            container.innerHTML = wishlist.map(item => `
                <div class="product-card">
                    <div class="product-card-img-wrap" style="height:140px;">
                        ${item.img ? `<img src="${item.img}" style="height:100px;">` : `<div style="font-size:3rem">💊</div>`}
                    </div>
                    <div class="product-card-body">
                        <div class="product-name" style="font-size:0.85rem;">${item.name}</div>
                        <div class="product-footer">
                            <div class="product-price">₹${item.price}</div>
                            <div class="d-flex gap-2">
                                <button class="cart-item-remove" onclick="removeFromWishlist('${item.name.replace(/'/g, "\\'")}')" title="Remove">✕</button>
                                <button class="btn-add-cart" onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price})" style="padding:6px 12px;">
                                    <i class="fa fa-shopping-cart"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function renderTracking() {
            const container = document.getElementById('trackingContent');
            try {
                const res = await fetch(`${API_URL}/orders/myorders`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const orders = await res.json();
                
                if (orders.length === 0) {
                    container.innerHTML = '<p class="text-center py-5" style="color:var(--gray-400)">No active orders to track.</p>';
                    return;
                }
                
                const latest = orders[orders.length - 1];
                container.innerHTML = `
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div>
                            <div style="font-weight:700;">Tracking ID: MS-${latest._id.slice(-6).toUpperCase()}</div>
                            <div style="font-size:0.8rem;color:var(--gray-500);">Status: ${latest.status.toUpperCase()}</div>
                        </div>
                        <span class="order-status status-shipped">In Transit</span>
                    </div>
                    <div class="tracking-timeline">
                        <div class="timeline-step active">
                            <div class="timeline-dot"></div>
                            <div style="font-weight:700;font-size:0.9rem;">Order Placed</div>
                            <div style="font-size:0.75rem;color:var(--gray-400);">${new Date(latest.createdAt).toLocaleString()}</div>
                        </div>
                        <div class="timeline-step active">
                            <div class="timeline-dot"></div>
                            <div style="font-weight:700;font-size:0.9rem;">Packed & Shipped</div>
                            <div style="font-size:0.75rem;color:var(--gray-400);">Package leaves warehouse</div>
                        </div>
                        <div class="timeline-step">
                            <div class="timeline-dot"></div>
                            <div style="font-weight:700;font-size:0.9rem;">Out for Delivery</div>
                            <div style="font-size:0.75rem;color:var(--gray-400);">Expected by evening</div>
                        </div>
                        <div class="timeline-step" style="padding-bottom:0;">
                            <div class="timeline-dot"></div>
                            <div style="font-weight:700;font-size:0.9rem;">Delivered</div>
                        </div>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = '<p class="text-center py-5">Error loading tracking info.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab') || 'profile';
            switchDashTab(tab);
        });
    </script>
</body>

</html>
